name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

  server-health:
    name: Server Health Check
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required secret
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          if [ -z "$OPENCODE_API_KEY" ]; then
            echo "::error::OPENCODE_API_KEY secret is not set. Add it in Repository Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Create .env file
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_BASE_URL: ${{ secrets.OPENCODE_BASE_URL }}
        run: |
          BASE_URL="${OPENCODE_BASE_URL:-https://opencode.ai/zen/v1/chat/completions}"
          cat > .env << EOF
          OPENCODE_API_KEY=$OPENCODE_API_KEY
          OPENCODE_BASE_URL=$BASE_URL
          PORT=3001
          EOF
          sed -i 's/^          //' .env

      - name: Start server
        run: |
          npx tsx server/index.ts &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> "$GITHUB_ENV"

      - name: Wait for server startup
        run: |
          echo "Waiting for server to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "Server is ready."
              exit 0
            fi
            sleep 1
          done
          echo "::error::Server failed to start within 30 seconds."
          exit 1

      - name: Verify health endpoint
        run: |
          RESPONSE=$(curl -s http://localhost:3001/api/health)
          echo "Health response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"status":"ok"'; then
            echo "Health check passed."
          else
            echo "::error::Health check failed. Response: $RESPONSE"
            exit 1
          fi

      - name: Stop server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill "$SERVER_PID" 2>/dev/null || true
          fi
