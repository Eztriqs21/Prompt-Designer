services:
  - type: web
    name: prompt-designer-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/.playwright-cache npx playwright install --with-deps chromium
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: OPENCODE_API_KEY
        sync: false
      - key: OPENCODE_BASE_URL
        value: https://opencode.ai/zen/v1/chat/completions
      - key: PORT
        value: 3001
      - key: CORS_ORIGINS
        sync: false
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/.playwright-cache
